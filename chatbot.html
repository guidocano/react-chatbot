<!DOCTYPE html>
<html>
  <head>
    <title>React Chatbot</title>
    <style>

      body {
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }

      .send-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 40px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
        /* padding-top: 20px; */
      }

    .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 10px;
        max-width: 300px;
    }

    .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
    }

    .chat-message-bot {
        display: flex;
        align-items: start;
    }

    .chat-message-profile{
      width:45px;
    }

    .chat-messages-container{
      flex-grow: 1;
      margin-top: 20px;
      overflow: scroll;
      scrollbar-width: none;
    }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        // Function ChatInput
        function ChatInput({ chatMessages, setChatMessages}) {
          const [inputText, setInputText] = React.useState("");

          function saveInputText(event){
            setInputText(event.target.value);
  
          }

          function sendMessage() {
            const newChatMessages = [
              ...chatMessages, {
                message: inputText,
                sender: "user",
                id: crypto.randomUUID
              }
            ];

          setChatMessages(newChatMessages);

          const response = Chatbot.getResponse(inputText);
            setChatMessages([
              ...newChatMessages, {
                message: response,
                sender: "bot",
                id: crypto.randomUUID
              }
            ]);


          setInputText("");
          }

          return (
            <div className="chat-input-container">
              <input 
                placeholder="Send a message to Chatbot" 
                size="30"
                onChange={saveInputText}
                value={inputText}
                className="chat-input"
              />
              <button className="send-button" onClick={sendMessage}>Send</button>
            </div>
          )
        }

        // Function ChatMessage
        function ChatMessage({message, sender}){
          // const message = props.message;
          // const sender = props.sender;
          //const {message, sender} = props;

          return (
            <div className={sender === "user"? 'chat-message-user' : 'chat-message-bot' }>
              {sender === "bot" && <img className="chat-message-profile" src="robot.png"/>}
              <div className="chat-message-text">
              {message}
              </div>
              {sender === "user" && <img className="chat-message-profile" src="user.png"/>}
            </div>
          );
        }

        // Function ChatMessages
        function ChatMessages( {chatMessages}) {
          const chatMessagesRef = React.useRef(null);

          React.useEffect(()=> {
            const containerElem = chatMessagesRef.current;
            if (containerElem) {
              containerElem.scrollTop = containerElem.scrollHeight
            }
          }, [chatMessages]);

          return (
            <div className="chat-messages-container"
            ref={chatMessagesRef}>

            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage 
                  message={chatMessage.message} 
                  sender={chatMessage.sender}
                  key={chatMessage.id}/>
              )
              })}
            </div>
            )
        }

      
        // Function App
        function App() {
            const [chatMessages, setChatMessages] = React.useState([{
            message: "hello chatbot",
            sender: "user",
            id: "1"
          }, {
            message: "Hello! How can I help you today?",
            sender: "bot",
            id: "2"
          },{
            message: "Can you get me today's date?",
            sender: "user", 
            id: "3"
          }, {
            message: "Today is... not really sure",
            sender: "bot", 
            id: "4"
          }]);
          //const [chatMessages, setChatMessages]= array;
          // const chatMessages = array[0];
          // const setChatMessages = array[1];

          return(
            <div className="app-container">

              <ChatMessages 
                chatMessages={chatMessages}
              />
              <ChatInput 
                chatMessages={chatMessages}
                setChatMessages={setChatMessages}
              />
            </div>
          )
        }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
