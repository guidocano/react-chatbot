<!DOCTYPE html>
<html>
  <head>
    <title>React Chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function ChatInput(){
          return (
            <>
              <input placeholder="Send a message to Chatbot" size="30"/>
              <button>Send</button>
            </>
          )
        }

        function ChatMessage(props){
          const message = props.message;
          const sender = props.sender;

          if (sender === "bot") {
            return (
              <div>
                <img src="robot.png" width="50"/>
                {message}
              </div>
            )
          }

          return (
            <div>
              {message}
              <img src="user.png" width="50"/>
            </div>
          );
        }

        const app = (
            <>
                <ChatInput />
                <ChatMessage message="hello chatbot" sender="user"/>
                <ChatMessage message="Hello! How can I help you?" sender="bot"/>
                <ChatMessage message="Can you get me today's date?" sender="user"/>
                <ChatMessage message="Today is... not really sure" sender="bot"/>
                <ChatMessage message="Can you flip a coin for me mate?" sender="user"/>
                <ChatMessage message="Sure thing, tails." sender="bot"/>
            </>
        );

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(app);
    </script>
  </body>
</html>
